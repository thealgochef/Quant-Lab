    - "src/alpha_lab/agents/data_infra/ml/model_trainer.py"
    - "src/alpha_lab/agents/data_infra/ml/model_evaluator.py"
  evaluation_policy:
    - "Quality gates are computed from concatenated out-of-sample fold predictions."
    - "RFECV runs once before walk-forward loop; same features for all folds and final model."
    - "Label purging removes training rows whose forward window crosses test boundary."
    - "Block bootstrap for confidence intervals (block_size=10)."
    - "Brier score quality gate enforced."
    - "RTH coverage fraction reported."
    - "Feature stability (Spearman rank-correlation) reported."
    - "Trade utility metrics (expectancy, profit factor) surfaced."
    - "Feature cache keyed to config hash (mode + all parameters)."
    - "The saved runtime model is refit on all labeled rows after evaluation."

