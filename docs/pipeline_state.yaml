training_modes:
  extrema_rebound_crossing:
    status: "ACTIVE (research)"
    description: "Binary tick-level extrema classifier"
    target: "rebound vs crossing at detected price extrema"
    features: "PL microstructure + MS momentum (~25 features)"
    labels: "binary (0=crossing, 1=rebound)"
    runtime_detector: "ml_extrema_classifier.py (EXPERIMENTAL — train/serve mismatch)"

  dashboard_utility:
    status: "ACTIVE (production-aligned)"
    description: "3-class level-touch classifier for Trading-Dashboard"
    target: "tradeable_reversal vs trap_reversal vs aggressive_blowthrough"
    features: "int_time_beyond_level, int_time_within_2pts, int_absorption_ratio"
    labels: "3-class (0=reversal, 1=trap, 2=blowthrough)"
    labeling_config: "configurable TP/SL (default +15/-30), MAE-first ordering"
    runtime_consumer: "Trading-Dashboard model contract"

primary_workflow:
  status: "ACTIVE"
  entrypoints:
    - "scripts/ml_training_tab.py"
    - "scripts/dashboard.py"
  data_path:
    - "scripts/process_batch_download.py"
    - "src/alpha_lab/agents/data_infra/tick_store.py"
  training_modules:
